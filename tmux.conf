# core behavior and terminal options
source-file ~/.config/tmux/options.conf

# key bindings
source-file ~/.config/tmux/bindings.conf

# plugins and plugin configuration
source-file ~/.config/tmux/plugins.conf

# semantic theme palette (managed by the `theme` command)
source-file -q ~/.config/tmux/theme.conf

# visual styling (sourced after the palette so @theme_* vars are available)
source-file ~/.config/tmux/styling.conf

# initialize tmux plugin manager last, so all @fingers-*/@easy-motion-* style
# options exist before plugins read them at load time
run "~/.tmux/plugins/tpm/tpm"
