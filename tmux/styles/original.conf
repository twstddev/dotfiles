# original — powerline caps. Shared status/pane styling lives in ../common.conf.
set -gF window-status-separator " "
set -g window-status-format " #I#{?#{!=:#{window_name},Window}, #W,} "
set -g window-status-style "bg=terminal,fg=#{@theme_window_inactive}"
set -g window-status-current-format "#[fg=#{@theme_ac_active}, bg=terminal]#[fg=#{@theme_bg}, bg=#{@theme_ac_active}]#I#{?#{!=:#{window_name},Window}, #W,}#[fg=#{@theme_ac_active}, bg=terminal]#[none]"
set -g window-status-current-style "bg=#{@theme_ac_active},fg=#{@theme_bg},bold"
