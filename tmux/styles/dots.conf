# dots — dot markers. Shared status/pane styling lives in ../common.conf.
set -gF window-status-separator "   "
set -g window-status-format "#[fg=#{@theme_muted}]○ #[fg=#{@theme_window_inactive}]#I#{?#{!=:#{window_name},Window}, #W,}"
set -g window-status-style "none"
set -g window-status-current-format "#[fg=#{@theme_ac_active}]● #[fg=#{@theme_ac_active},bold]#I#{?#{!=:#{window_name},Window}, #W,}"
set -g window-status-current-style "none"
