# flat — no shapes. Shared status/pane styling lives in ../common.conf.
set -gF window-status-separator "  "
set -g window-status-format " #I#{?#{!=:#{window_name},Window}, #W,} "
set -g window-status-style "bg=terminal,fg=#{@theme_window_inactive}"
set -g window-status-current-format " #I#{?#{!=:#{window_name},Window}, #W,} "
set -g window-status-current-style "bg=terminal,fg=#{@theme_ac_active},bold"
