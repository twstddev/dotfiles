# green accent — rotates palette hues so green leads the active role.
# Resolves the 5 permuted display roles (@theme_ac_*) at source time via set -gF;
# tmux cannot expand nested #{...} at draw time, so this must run when sourced.
set -gF @theme_ac_active  "#{@theme_session}"
set -gF @theme_ac_session "#{@theme_teal}"
set -gF @theme_ac_zoom    "#{@theme_zoom}"
set -gF @theme_ac_command "#{@theme_window_active}"
set -gF @theme_ac_clock   "#{@theme_sky}"

# active pane border follows the accent
set -gF @theme_border_active "#{@theme_session}"
