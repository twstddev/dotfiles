# peach accent — identity mapping (matches the raw palette roles).
# Resolves the 5 permuted display roles (@theme_ac_*) at source time via set -gF;
# tmux cannot expand nested #{...} at draw time, so this must run when sourced.
set -gF @theme_ac_active  "#{@theme_window_active}"
set -gF @theme_ac_session "#{@theme_session}"
set -gF @theme_ac_zoom    "#{@theme_zoom}"
set -gF @theme_ac_command "#{@theme_command}"
set -gF @theme_ac_clock   "#{@theme_clock}"

# active pane border follows the accent
set -gF @theme_border_active "#{@theme_window_active}"
