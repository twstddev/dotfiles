# plugins
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'twstddev/tmux-jump'
set -g @plugin 'Morantron/tmux-fingers'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'roosta/tmux-fuzzback'
set -g @plugin 'catppuccin/tmux#v2.1.2'
set -g @plugin 'christoomey/vim-tmux-navigator'

set -g @jump-key 'a'

set -g @fuzzback-bind f

# jump
set -g @jump-bg-color '\e[0m\e[38;2;108;112;134m'
set -g @jump-fg-color '\e[38;2;166;227;161m'

# fingers
set -g @fingers-hint-style "fg=colour157,bold"
set -g @fingers-backdrop-style "fg=colour60"
set -g @fingers-highlight-style "fg=colour60"
set -g @fingers-pattern-0 "arn:aws:[^\s]+"

# catppuccin
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_status_background "none"

set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"

set -g @catppuccin_window_flags "none"
set -g @catppuccin_window_status_style "none"

# tmux vim navigator
set -g @vim_navigator_mapping_left "C-h"  # use C-h and C-Left
set -g @vim_navigator_mapping_right "C-l"
set -g @vim_navigator_mapping_up "C-k"
set -g @vim_navigator_mapping_down "C-j"
set -g @vim_navigator_mapping_prev ""

# initialize tmux plugin manager
run "~/.tmux/plugins/tpm/tpm"
