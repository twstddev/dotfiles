set -g @theme_urgent          "#f85552"
set -g @theme_session         "#8da101"
set -g @theme_window_active   "#f57d26"
set -g @theme_window_inactive "#5c6a72"
set -g @theme_command         "#df69ba"
set -g @theme_zoom            "#dfa000"
set -g @theme_clock           "#3a94c5"
set -g @theme_muted           "#939f91"
set -g @theme_border_active   "#35a77c"
