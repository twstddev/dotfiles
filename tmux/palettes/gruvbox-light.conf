# gruvbox-light — semantic tmux palette (11 roles). Managed alongside the `theme` command.
set -g @theme_bg              "#fbf1c7"
set -g @theme_urgent          "#9d0006"
set -g @theme_session         "#79740e"
set -g @theme_window_active   "#af3a03"
set -g @theme_window_inactive "#504945"
set -g @theme_command         "#8f3f71"
set -g @theme_zoom            "#b57614"
set -g @theme_clock           "#076678"
set -g @theme_muted           "#928374"
set -g @theme_border_active   "#427b58"
set -g @theme_border          "#eaddb6"
set -g @theme_teal            "#406d43"
set -g @theme_sky             "#246a5e"
set -g @theme_flamingo        "#9c5250"
