# tmux visual styling — status bar, windows, panes, borders.
# Sourced after theme.conf so the @theme_* palette variables are available.

set -g status-interval 1
set -g status on
set -g status-justify absolute-centre

# window styling
set -g window-status-activity-style "bg=#{@theme_urgent},fg=#{@theme_bg}"
set -g window-status-bell-style "bg=#{@theme_urgent},fg=#{@theme_bg},bold"
set -gF window-status-separator " "

set -g window-status-format " #I#{?#{!=:#{window_name},Window}, #W,} "
set -g window-status-style "bg=terminal,fg=#{@theme_window_inactive}"

set -g window-status-current-format "#[fg=#{@theme_window_active}, bg=terminal]#[fg=#{@theme_bg}, bg=#{@theme_window_active}]#I#{?#{!=:#{window_name},Window}, #W,}#[fg=#{@theme_window_active}, bg=terminal]#[none]"
set -g window-status-current-style "bg=#{@theme_window_active},fg=#{@theme_bg},bold"

# pane styling
set -g pane-border-format ""
set -g pane-border-status bottom
set -g pane-border-style fg=colour0
set -g pane-border-lines heavy
set -g pane-border-indicators both

# status left styling
set -g status-left-length 100
set -g status-left ""
set -ga status-left "#{?client_prefix,#{#[bg=#{@theme_urgent},fg=#{@theme_bg},bold]  #S },#{#[bg=terminal,fg=#{@theme_session}]  #S }}"
set -ga status-left "#[bg=terminal,fg=#{@theme_muted},none]"
set -ga status-left "#[bg=terminal,fg=#{@theme_command}]  #{pane_current_command} "
set -ga status-left "#[bg=terminal,fg=#{@theme_muted},none]"
set -ga status-left "#[bg=terminal,fg=#{@theme_zoom}]#{?window_zoomed_flag,  zoom ,}"

# status right styling
 set -g status-right-length 100
 set -g status-right ""
 set -ga status-right "#[bg=terminal,fg=#{@theme_clock}] 󰅐 %H:%M "

# border styling
set -g pane-active-border-style "fg=#{@theme_border_active}"
set -g pane-border-style "fg=#{@theme_border}"
