# tmux visual styling — dispatcher.
# Sourced after theme.conf so the @theme_* palette variables are available.
#
# Two orthogonal axes, each a file loaded by an option value:
#   @tmux_style   shape/layout (original, flat, dots) — a file in tmux/styles/
#   @tmux_accent  colour permutation (peach, green, maroon) — a file in tmux/accents/
#
# Each accent file resolves the 5 permuted display roles (@theme_ac_*) from the
# palette; each style file is self-contained and reads @theme_ac_* for those
# roles, so switching either axis at runtime leaves no leftover state.
#
# Switch live:   tmux set -g @tmux_style flat \; source-file ~/.config/tmux/styling.conf
#                tmux set -g @tmux_accent green \; source-file ~/.config/tmux/styling.conf
# Or use the menu:  prefix + S   (bound below)

# defaults when unset
%if "#{==:#{@tmux_style},}"
set -g @tmux_style "dots"
%endif
%if "#{==:#{@tmux_accent},}"
set -g @tmux_accent "peach"
%endif

# load the selected accent: resolves @theme_ac_* from the palette hues
source-file -F "~/.config/tmux/accents/#{@tmux_accent}.conf"

# non-visual status basics shared by every style
set -g status on
set -g status-interval 1
set -g status-style "default"

# reset position to bottom before each load; top-bar styles override this
set -g status-position bottom

# reset pane-content dimming; only styles that want it re-enable
set -g window-style "default"
set -g window-active-style "default"

# activity/bell colors shared by every style
set -g window-status-activity-style "bg=#{@theme_urgent},fg=#{@theme_bg}"
set -g window-status-bell-style "bg=#{@theme_urgent},fg=#{@theme_bg},bold"

# center the window list
set -g status-justify absolute-centre

# pane styling
set -g pane-border-format ""
set -g pane-border-status bottom
set -g pane-border-lines single
set -g pane-border-indicators off
set -g pane-active-border-style "fg=#{@theme_border_active}"
set -g pane-border-style "fg=#{@theme_border}"

# messages, menus, popups, and modes
set -gF message-style "fg=#{@theme_teal},bg=default,align=centre"
set -gF message-command-style "fg=#{@theme_teal},bg=default,align=centre"
set -gF menu-selected-style "fg=#{@theme_bg},bg=#{@theme_ac_active},bold"
set -gF popup-style "bg=#{@theme_bg},fg=#{@theme_window_inactive}"
set -gF popup-border-style "fg=#{@theme_border_active}"
set -gF mode-style "fg=#{@theme_bg},bg=#{@theme_ac_active},bold"
set -gF clock-mode-colour "#{@theme_clock}"

# tmux-fingers only accepts the xterm-256 colourN syntax, so each palette
# supplies the closest indexed equivalents of its Neovim-derived colours.
set -gF @fingers-hint-style "#{@theme_fingers_hint_style}"
set -gF @fingers-backdrop-style "fg=#{@theme_fingers_muted}"
set -gF @fingers-highlight-style "fg=#{@theme_fingers_muted}"
set -gF @fingers-selected-hint-style "#{@theme_fingers_hint_style}"
set -gF @fingers-selected-highlight-style "fg=#{@theme_fingers_muted}"

# Match Neovim's FlashBackdrop and use FlashLabel for every target label.
set -gF @easy-motion-dim-style "#{@theme_motion_dim_style}"
set -gF @easy-motion-highlight-style "#{@theme_motion_label_style}"
set -gF @easy-motion-highlight-2-first-style "#{@theme_motion_label_style}"
set -gF @easy-motion-highlight-2-second-style "#{@theme_motion_label_style}"

# status left: session + zoom
set -g status-left-length 100
set -g status-left ""
set -ga status-left "#{?client_prefix,#[bg=#{@theme_urgent}#,fg=#{@theme_bg}#,bold]  #S ,#[bg=terminal#,fg=#{@theme_ac_session}]  #S }"
set -ga status-left "#[bg=terminal,fg=#{@theme_ac_zoom}]#{?window_zoomed_flag,  zoom ,}"

# status right: app (terminal) then clock
set -g status-right-length 100
set -g status-right ""
set -ga status-right "#[bg=terminal,fg=#{@theme_ac_command}]  #{pane_current_command} "
set -ga status-right "#[bg=terminal,fg=#{@theme_muted},none]"
set -ga status-right "#[bg=terminal,fg=#{@theme_ac_clock}]  %H:%M "

# load the selected look (window-status shape only)
source-file -F "~/.config/tmux/styles/#{@tmux_style}.conf"
